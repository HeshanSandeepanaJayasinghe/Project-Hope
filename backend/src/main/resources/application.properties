spring.application.name=backend

spring.data.mongodb.host=${mongo.host}
spring.data.mongodb.port=${mongo.port}
spring.data.mongodb.database=${mongo.db}

jwt.secret.key=${secret.key}

merchent.secret=${merchent.secret}
merchent.id=${merchent.id}

spring.servlet.multipart.max-file-size=10MB

upload.directory=uploads/
image.upload.directory=postImages/
spring.jackson.time-zone=UTC

logging.level.org.springframework.web=DEBUG
